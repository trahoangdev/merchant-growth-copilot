services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: merchant_growth_postgres
    environment:
      POSTGRES_DB: merchant_growth_copilot
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - merchant_growth_pgdata:/var/lib/postgresql/data
      - ./server/db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d merchant_growth_copilot"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: merchant_growth_redis
    ports:
      - "6379:6379"

volumes:
  merchant_growth_pgdata:
